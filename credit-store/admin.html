<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>

  <style>
    body {
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      padding: 20px;
    }

    h1 {
      color: #00ff88;
    }

    input, button {
      padding: 10px;
      margin: 5px;
    }

    button {
      cursor: pointer;
    }

    .key {
      background: #1c1c1c;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 8px;
    }

    .credits {
      color: #00ff88;
      font-weight: bold;
    }

    .used {
      color: red;
    }

    .unused {
      color: #00ff88;
    }

    .error {
      color: red;
      margin-top: 10px;
    }

    #dashboard {
      display: none;
    }
  </style>
</head>

<body>

<!-- ---------------- LOGIN ---------------- -->
<div id="loginBox">
  <h1>🔐 Admin Login</h1>

  <input type="password" id="password" placeholder="Enter password" />
  <button onclick="login()">Login</button>

  <p id="loginError" class="error"></p>
</div>

<!-- ---------------- DASHBOARD ---------------- -->
<div id="dashboard">
  <h1>🔐 Admin Dashboard</h1>
  <p>All purchased keys:</p>

  <button onclick="logout()">Logout</button>

  <div id="keys">Loading...</div>
  <div id="error" class="error"></div>
</div>

<script>
  // ---------------- LOGIN ----------------
  async function login() {
    const password = document.getElementById("password").value;

    const res = await fetch("/admin/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ password })
    });

    const data = await res.json();

    if (!res.ok) {
      document.getElementById("loginError").innerText = "❌ Wrong password";
      return;
    }

    localStorage.setItem("admin_token", data.token);

    document.getElementById("loginBox").style.display = "none";
    document.getElementById("dashboard").style.display = "block";

    loadKeys();
  }

  // ---------------- LOAD KEYS ----------------
  async function loadKeys() {
    try {
      const token = localStorage.getItem("admin_token");

      const res = await fetch("/admin/keys", {
        headers: {
          "x-admin-token": token
        }
      });

      if (!res.ok) {
        throw new Error("Unauthorized or server error");
      }

      const data = await res.json();

      const container = document.getElementById("keys");
      container.innerHTML = "";

      data.forEach(k => {
        const div = document.createElement("div");
        div.className = "key";

        div.innerHTML = `
          <div>🔑 <b>${k.key}</b></div>
          <div class="credits">${k.credits} credits</div>
          <div>Status: <span class="${k.used ? "used" : "unused"}">
            ${k.used ? "USED" : "NOT USED"}
          </span></div>
          <div style="opacity:0.5;font-size:12px">
            ${new Date(k.createdAt).toLocaleString()}
          </div>
        `;

        container.appendChild(div);
      });

    } catch (err) {
      document.getElementById("error").innerText =
        "Error loading keys: " + err.message;
    }
  }

  // ---------------- LOGOUT ----------------
  function logout() {
    localStorage.removeItem("admin_token");
    location.reload();
  }

  // ---------------- AUTO LOGIN IF TOKEN EXISTS ----------------
  if (localStorage.getItem("admin_token")) {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
    loadKeys();
  }
</script>

</body>
</html>
