<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Cancelled - MCALTS</title>

  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      color: white;
      background: #08080d;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(to bottom, rgba(8, 8, 13, 0.55), rgba(8, 8, 13, 0.96)),
        url("/hero-bg.jpg");
      background-size: cover;
      background-position: center;
      z-index: -2;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at top left, rgba(255, 88, 88, 0.16), transparent 34%),
        radial-gradient(circle at bottom right, rgba(109, 92, 255, 0.16), transparent 30%);
      z-index: -1;
    }

    .card {
      width: 100%;
      max-width: 560px;
      padding: 36px;
      border-radius: 28px;
      background: rgba(10, 10, 18, 0.82);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 28px 80px rgba(0,0,0,0.45);
      backdrop-filter: blur(18px);
      text-align: center;
    }

    .icon {
      width: 72px;
      height: 72px;
      margin: 0 auto 18px;
      border-radius: 22px;
      background: rgba(255, 88, 88, 0.12);
      border: 1px solid rgba(255, 88, 88, 0.28);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
    }

    h1 {
      margin: 0;
      font-size: 36px;
      font-weight: 900;
      letter-spacing: -1px;
    }

    p {
      margin: 14px auto 0;
      max-width: 430px;
      color: rgba(255,255,255,0.64);
      line-height: 1.6;
      font-size: 15px;
    }

    .actions {
      margin-top: 28px;
      display: grid;
      gap: 12px;
    }

    a {
      height: 50px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      font-weight: 900;
      font-size: 15px;
    }

    .primary {
      background: linear-gradient(135deg, #7967ff, #5d4bff);
      color: white;
      box-shadow: 0 16px 34px rgba(93, 75, 255, 0.25);
    }

    .secondary {
      color: #d8d2ff;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(128,116,255,0.28);
    }

    @media (max-width: 520px) {
      .card {
        padding: 26px 20px;
        border-radius: 24px;
      }

      h1 {
        font-size: 30px;
      }
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="icon">✕</div>

    <h1>Payment Cancelled</h1>

    <p>
      No payment was taken. You can go back to the store and choose a credit pack again whenever you are ready.
    </p>

    <div class="actions">
      <a class="primary" href="/">Back to Store</a>
      <a class="secondary" href="https://discord.gg/PDJJK2byVP" target="_blank" rel="noopener noreferrer">Need Help? Join Discord</a>
    </div>
  </div>

</body>
</html>
