<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Payment Successful</title>

  <style>
    body {
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .box {
      background: #1c1c1c;
      padding: 40px;
      border-radius: 12px;
      min-width: 300px;
    }

    h1 {
      color: #00ff88;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      background: #00ff88;
      cursor: pointer;
      font-weight: bold;
      border-radius: 6px;
    }

    #key-box {
      margin-top: 20px;
      font-size: 18px;
      color: #ffffff;
    }
  </style>
</head>

<body>

  <div class="box">
    <h1>✅ Payment Successful!</h1>
    <p>Your key has been generated below:</p>

    <h2 id="key-box">Generating your key...</h2>

    <button onclick="window.location.href='/'">
      Back to Store
    </button>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
const credits = params.get("credits");

console.log("credits:", credits);

if (!credits) {
  document.getElementById("key-box").innerText =
    "Error: missing credits from URL";
  throw new Error("Missing credits");
}
    fetch(`/get-key?credits=${credits}&secret=MY_SECRET_CODE_123`)
  .then(res => res.json())
  .then(data => {
    console.log("API RESPONSE:", data);

    if (!data.key) {
      document.getElementById("key-box").innerText =
        "Error: no key returned";
      return;
    }

    document.getElementById("key-box").innerText =
      `🎁 Your Key: ${data.key} (${data.credits} credits)`;
  })
  .catch(err => {
    console.log(err);
    document.getElementById("key-box").innerText =
      "Server error generating key";
  });
  </script>

</body>
</html>
