<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Payment Successful</title>
  <style>
    body {
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .box {
      background: #1c1c1c;
      padding: 40px;
      border-radius: 12px;
    }

    h1 {
      color: #00ff88;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      background: #00ff88;
      cursor: pointer;
      font-weight: bold;
      border-radius: 6px;
    }
  </style>
</head>
<body>

  <div class="box">
    <h1>✅ Payment Successful!</h1>
    <p>Your key will be delivered shortly.</p>

    <button onclick="window.location.href='/'">
      Back to Store
    </button>
  </div>
<h2 id="key-box">Generating your key...</h2>

<script>
  const params = new URLSearchParams(window.location.search);
  const credits = params.get("credits");

  fetch(`/get-key?credits=${credits}&secret=MY_SECRET_CODE_123`)
    .then(res => res.json())
    .then(data => {
      document.getElementById("key-box").innerText =
        `🎁 Your Key: ${data.key} (${data.credits} credits)`;
    })
    .catch(() => {
      document.getElementById("key-box").innerText =
        "Error generating key";
    });
</script>
</body>
</html>
